version: '3'

vars:
  APP_NAME: SignatureInstaller
  BUILD_DIR: build
  TEMPLATES_DIR: templates
  SRC_DIR: ./cmd/signature-installer
  BINARY: '{{.BUILD_DIR}}/{{.APP_NAME}}{{if eq OS "windows"}}.exe{{end}}'

tasks:
  default:
    desc: Build the application with all dependencies
    cmds:
      - task: build
      - task: copy-templates

  # Build the application for current platform
  build:
    desc: Build the application for current platform
    cmds:
      - go build -o {{.BINARY}} {{.SRC_DIR}}

  # Copy templates to the build directory
  copy-templates:
    desc: Copy template files
    cmds:
      # Copy templates
      - cmd: cp -r {{.TEMPLATES_DIR}}/* {{.BUILD_DIR}}/templates/
        platforms: [linux, darwin]
      - cmd: xcopy /E /I /Y {{.TEMPLATES_DIR}} {{.BUILD_DIR}}\\templates
        platforms: [windows]

  # This task is to build on macOS/Linux for the Windows platform      
  cross-build-windows:
    desc: Cross-compile for Windows (from macOS/Linux)
    platforms: [darwin, linux]
    cmds:
      - GOOS=windows GOARCH=amd64 go build -o {{.BINARY}} {{.SRC_DIR}}
      - task: copy-templates

  # This task is to build on Windows for the Windows platform      
  build-windows:
    desc: Build Windows application (on Windows)
    platforms: [windows]
    cmds:
      - task: build
      - task: copy-templates

  sign-windows:
    desc: Sign Windows executable
    deps: [cross-build-windows]
    platforms: [darwin, linux]
    cmds:
      - |
        if [ ! -f "{{.CERT_FILE}}" ]; then
          echo "Error: Certificate file {{.CERT_FILE}} not found"
          exit 1
        fi
      - osslsigncode sign -pkcs12 {{.CERT_FILE}} -askpass -n {{.APP_NAME}} -i {{.CERT_URL}} -in {{.BINARY}} -out {{.WINDOWS_SIGNED}}

  sign-windows-native:
    desc: Sign Windows executable (on Windows)
    deps: [build-windows]
    platforms: [windows]
    cmds:
      - signtool sign /f {{.CERT_FILE}} /p {{.CERT_PASSWORD}} /t http://timestamp.digicert.com {{.BINARY}} 