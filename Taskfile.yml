version: '3'

vars:
  APP_NAME: SignatureInstaller
  BUILD_DIR: build
  TEMPLATES_DIR: templates
  # Prerequisite: Install code signing certificate in Windows certificate store
  CERT_NAME: "Marco Janker (Arbeit, Code signing)"
  SRC_DIR: ./cmd/signature-installer
  BINARY: '{{.BUILD_DIR}}/{{.APP_NAME}}{{if eq OS "windows"}}.exe{{end}}'
  WINDOWS_SIGNED: '{{.BUILD_DIR}}/{{.APP_NAME}}-signed.exe'

tasks:
  default:
    desc: Build the application with all dependencies
    cmds:
      - task: build
      - task: copy-templates
      - task: copy-config

  # Build the application for current platform
  build:
    desc: Build the application for current platform
    cmds:
      - go build -o {{.BINARY}} {{.SRC_DIR}}

  # Copy templates to the build directory
  copy-templates:
    desc: Copy template files
    cmds:
      # Create templates directory and copy templates
      - cmd: mkdir -p {{.BUILD_DIR}}/templates && cp -r {{.TEMPLATES_DIR}}/* {{.BUILD_DIR}}/templates/
        platforms: [linux, darwin]
      - cmd: if not exist {{.BUILD_DIR}}\\templates mkdir {{.BUILD_DIR}}\\templates && xcopy /E /I /Y {{.TEMPLATES_DIR}} {{.BUILD_DIR}}\\templates
        platforms: [windows]

  # Copy configuration file to build directory
  copy-config:
    desc: Copy configuration file
    cmds:
      - cmd: cp config.yaml {{.BUILD_DIR}}/
        platforms: [linux, darwin]
      - cmd: copy config.yaml {{.BUILD_DIR}}\\
        platforms: [windows]

  # This task is to build on macOS/Linux for the Windows platform      
  cross-build-windows:
    desc: Cross-compile for Windows (from macOS/Linux)
    platforms: [darwin, linux]
    cmds:
      - GOOS=windows GOARCH=amd64 go build -o {{.BINARY}} {{.SRC_DIR}}
      - task: copy-templates
      - task: copy-config

  # This task is to build on Windows for the Windows platform      
  build-windows:
    desc: Build for Windows (on Windows)
    platforms: [windows]
    cmds:
      - task: build
      - task: copy-templates
      - task: copy-config

  # Sign the Windows executable
  sign-windows:
    desc: Sign the Windows executable with code signing certificate
    platforms: [windows]
    cmds:
      - task: build-windows
      - cmd: signtool sign /n "{{.CERT_NAME}}" /t http://timestamp.digicert.com /fd sha256 /v "{{.BINARY}}"
      - cmd: move "{{.BINARY}}" "{{.WINDOWS_SIGNED}}"
      - echo "Signed executable saved as {{.WINDOWS_SIGNED}}"

  # Clean build artifacts
  clean:
    desc: Clean build artifacts
    cmds:
      - cmd: rm -rf {{.BUILD_DIR}}
        platforms: [linux, darwin]
      - cmd: rmdir /s /q {{.BUILD_DIR}}
        platforms: [windows]

  # Install dependencies
  deps:
    desc: Install Go dependencies
    cmds:
      - go mod download
      - go mod tidy

  # Run tests
  test:
    desc: Run tests
    cmds:
      - go test ./...

  # Run linter
  lint:
    desc: Run linter
    cmds:
      - golangci-lint run

  # Format code
  fmt:
    desc: Format Go code
    cmds:
      - go fmt ./...
      - goimports -w .

  # Check code
  check:
    desc: Check code quality
    cmds:
      - task: fmt
      - task: lint
      - task: test 