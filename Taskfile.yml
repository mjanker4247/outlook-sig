version: '3'

vars:
  APP_NAME: SignatureInstaller
  BUILD_DIR: build
  TEMPLATES_DIR: templates
  # Prerequisite: Install code signing certificate in Windows certificate store
  CERT_NAME: "Marco Janker (Arbeit, Code signing)"
  SRC_DIR: ./cmd/signature-installer
  BINARY: '{{.BUILD_DIR}}/{{.APP_NAME}}{{if eq OS "windows"}}.exe{{end}}'
  WINDOWS_SIGNED: '{{.BUILD_DIR}}/{{.APP_NAME}}-signed.exe'

tasks:
  default:
    desc: Build the application with all dependencies
    cmds:
      - task: build
      - task: copy-config

  # Build the application for current platform
  build:
    desc: Build the application for current platform
    cmds:
      - go build -o {{.BINARY}} {{.SRC_DIR}}

  # Copy configuration file to build directory
  copy-config:
    desc: Copy configuration file
    cmds:
      - cmd: cp config.yaml {{.BUILD_DIR}}/
        platforms: [linux, darwin]
      - cmd: copy config.yaml {{.BUILD_DIR}}\\
        platforms: [windows]

  # This task is to build on macOS/Linux for the Windows platform      
  cross-build-windows:
    desc: Cross-compile for Windows (from macOS/Linux)
    platforms: [darwin, linux]
    cmds:
      - mkdir -p {{.BUILD_DIR}}
      - GOOS=windows GOARCH=amd64 go build -tags "!windows" -o {{.BINARY}} {{.SRC_DIR}}
      - task: copy-config

  # Build CLI-only version for Windows (no GUI dependencies)
  cross-build-windows-cli:
    desc: Cross-compile CLI-only version for Windows (from macOS/Linux)
    platforms: [darwin, linux]
    cmds:
      - mkdir -p {{.BUILD_DIR}}
      - GOOS=windows GOARCH=amd64 go build -tags "!windows" -o {{.BUILD_DIR}}/{{.APP_NAME}}-cli.exe {{.SRC_DIR}}
      - task: copy-config

  # This task is to build on Windows for the Windows platform      
  build-windows:
    desc: Build for Windows (on Windows)
    platforms: [windows]
    cmds:
      - task: build
      - task: copy-config

  # Sign the Windows executable
  sign-windows:
    desc: Sign the Windows executable with code signing certificate
    platforms: [windows]
    cmds:
      - task: build-windows
      - cmd: signtool sign /n "{{.CERT_NAME}}" /t http://timestamp.digicert.com /fd sha256 /v "{{.BINARY}}"
      - cmd: move "{{.BINARY}}" "{{.WINDOWS_SIGNED}}"
      - echo "Signed executable saved as {{.WINDOWS_SIGNED}}"

  # Clean build artifacts
  clean:
    desc: Clean build artifacts
    cmds:
      - cmd: rm -rf {{.BUILD_DIR}}
        platforms: [linux, darwin]
      - cmd: rmdir /s /q {{.BUILD_DIR}}
        platforms: [windows]

  # Install dependencies
  deps:
    desc: Install Go dependencies
    cmds:
      - go mod download
      - go mod tidy

  # Update and check Go modules
  modules:
    desc: Update and check Go modules
    cmds:
      - go mod download
      - go mod verify
      - go mod tidy
      - go list -mod=mod -m all
      - go list -mod=mod -u -m all

  # Update Go modules to latest versions
  update-modules:
    desc: Update Go modules to latest versions
    cmds:
      - go get -u ./...
      - go mod tidy
      - go mod vendor
      - go mod verify
      - echo "Modules updated successfully"

  # Sync vendor directory
  vendor:
    desc: Sync vendor directory with go.mod
    cmds:
      - go mod vendor
      - go mod verify
      - echo "Vendor directory synced successfully"

  # Run tests
  test:
    desc: Run tests
    cmds:
      - go test ./...

  # Run linter
  lint:
    desc: Run linter
    cmds:
      - golangci-lint run

  # Format code
  fmt:
    desc: Format Go code
    cmds:
      - go fmt ./...
      - goimports -w .

  # Check code
  check:
    desc: Check code quality
    cmds:
      - task: fmt
      - task: lint
      - task: test 