version: "3"

vars:
  APP_NAME: SignatureInstaller
  APP_ID: com.janker.signatureinstaller   # Reverse-domain ID used by fyne-cross
  BUILD_DIR: build
  SRC_DIR: ./cmd/signature-installer
  FYNE_CROSS_BIN: fyne-cross/bin

  # -H windowsgui suppresses the console window on Windows. The binary re-attaches
  # to the parent terminal's console at runtime when CLI flags are present.
  LDFLAGS_WINDOWS: "-H windowsgui"

  # Current-platform binary (adds .exe on Windows)
  BINARY: '{{.BUILD_DIR}}/{{.APP_NAME}}{{if eq OS "windows"}}.exe{{end}}'

  # Explicit output paths for cross-builds
  BINARY_LINUX:          "{{.BUILD_DIR}}/{{.APP_NAME}}"
  BINARY_WINDOWS:        "{{.BUILD_DIR}}/{{.APP_NAME}}.exe"
  BINARY_WINDOWS_SIGNED: "{{.BUILD_DIR}}/{{.APP_NAME}}-signed.exe"
  BINARY_DARWIN:         "{{.BUILD_DIR}}/{{.APP_NAME}}"

  # Windows signing — certificate store name (signtool on Windows)
  CERT_NAME:     "Marco Janker (Arbeit, Code signing)"
  TIMESTAMP_URL: "http://timestamp.digicert.com"
  # Cross-platform Windows signing (osslsigncode on Linux/macOS):
  #   set SIGNING_CERT_PFX (path to .pfx/.p12) and SIGNING_CERT_PASSWORD
  # macOS signing:   set MACOS_SIGNING_IDENTITY ("Developer ID Application: Name (TEAMID)")
  # macOS notarization: set APPLE_ID, APPLE_TEAM_ID, APPLE_APP_PASSWORD
  # Linux GPG signing:  set GPG_KEY_ID

tasks:
  default:
    desc: Build for current platform and copy assets
    cmds:
      - task: build
      - task: copy-assets

  # ── Native builds ───────────────────────────────────────────────────────────

  build:
    desc: Build for current platform
    cmds:
      - mkdir -p {{.BUILD_DIR}}
      - cmd: go build -ldflags="{{.LDFLAGS_WINDOWS}}" -o {{.BINARY}} {{.SRC_DIR}}
        platforms: [windows]
      - cmd: go build -o {{.BINARY}} {{.SRC_DIR}}
        platforms: [linux, darwin]

  build-windows:
    desc: Build for Windows (run on Windows)
    platforms: [windows]
    cmds:
      - task: build
      - task: copy-assets

  # ── Cross-compilation via fyne-cross (Docker required) ─────────────────────
  # fyne-cross provides Fyne-tailored Docker images with CGO, MingW/osxcross,
  # and OpenGL/GLFW headers for each target — the correct approach for this app.
  # Install: go install github.com/fyne-io/fyne-cross@latest
  # Output lands in fyne-cross/bin/<os>-<arch>/ and is copied to build/.

  cross-windows:
    desc: Cross-compile for Windows/amd64 via fyne-cross (Docker)
    platforms: [linux, darwin]
    cmds:
      - fyne-cross windows -arch=amd64 -ldflags="{{.LDFLAGS_WINDOWS}}" -app-id {{.APP_ID}} {{.SRC_DIR}}
      - mkdir -p {{.BUILD_DIR}}
      - cp {{.FYNE_CROSS_BIN}}/windows-amd64/{{.APP_NAME}}.exe {{.BINARY_WINDOWS}}
      - task: copy-assets-posix

  cross-linux:
    desc: Cross-compile for Linux/amd64 via fyne-cross (Docker)
    cmds:
      - fyne-cross linux -arch=amd64 -app-id {{.APP_ID}} {{.SRC_DIR}}
      - mkdir -p {{.BUILD_DIR}}
      - cp {{.FYNE_CROSS_BIN}}/linux-amd64/{{.APP_NAME}} {{.BINARY_LINUX}}
      - task: copy-assets-posix

  cross-darwin:
    desc: Cross-compile for macOS/amd64 via fyne-cross (Docker)
    platforms: [linux]
    cmds:
      - fyne-cross darwin -arch=amd64 -app-id {{.APP_ID}} {{.SRC_DIR}}
      - mkdir -p {{.BUILD_DIR}}
      - cp {{.FYNE_CROSS_BIN}}/darwin-amd64/{{.APP_NAME}} {{.BINARY_DARWIN}}
      - task: copy-assets-posix

  cross-all:
    desc: Cross-compile for all platforms via fyne-cross (Docker)
    platforms: [linux, darwin]
    cmds:
      - task: cross-linux
      - task: cross-windows
      - task: cross-darwin

  fyne-cross-install:
    desc: Install fyne-cross tool
    cmds:
      - go install github.com/fyne-io/fyne-cross@latest

  # ── Code signing ────────────────────────────────────────────────────────────

  sign-windows:
    desc: >
      Sign Windows executable.
      On Windows: signtool with CERT_NAME from certificate store.
      On Linux/macOS: osslsigncode with SIGNING_CERT_PFX + SIGNING_CERT_PASSWORD (cross-signing).
    cmds:
      - cmd: >
          signtool sign /n "{{.CERT_NAME}}" /t {{.TIMESTAMP_URL}} /fd sha256 /v "{{.BINARY_WINDOWS}}"
        platforms: [windows]
      - cmd: >
          osslsigncode sign
          -pkcs12 "$SIGNING_CERT_PFX"
          -pass "$SIGNING_CERT_PASSWORD"
          -t {{.TIMESTAMP_URL}}
          -in {{.BINARY_WINDOWS}}
          -out {{.BINARY_WINDOWS_SIGNED}} &&
          echo "Signed: {{.BINARY_WINDOWS_SIGNED}}"
        platforms: [linux, darwin]

  sign-macos:
    desc: Sign macOS binary with codesign (requires MACOS_SIGNING_IDENTITY env var)
    platforms: [darwin]
    cmds:
      - codesign --deep --force --verify --verbose --sign "$MACOS_SIGNING_IDENTITY" {{.BINARY_DARWIN}}
      - codesign --verify --verbose {{.BINARY_DARWIN}}

  notarize-macos:
    desc: Notarize macOS binary (requires APPLE_ID, APPLE_TEAM_ID, APPLE_APP_PASSWORD env vars)
    platforms: [darwin]
    cmds:
      - xcrun notarytool submit {{.BINARY_DARWIN}}
          --apple-id "$APPLE_ID"
          --team-id "$APPLE_TEAM_ID"
          --password "$APPLE_APP_PASSWORD"
          --wait
      - xcrun stapler staple {{.BINARY_DARWIN}}

  sign-linux:
    desc: Create detached GPG signature for Linux binary (requires GPG_KEY_ID env var)
    platforms: [linux]
    cmds:
      - gpg --batch --yes --armor --detach-sign --local-user "$GPG_KEY_ID" {{.BINARY_LINUX}}
      - echo "Signature written to {{.BINARY_LINUX}}.asc"

  # ── Testing & quality ───────────────────────────────────────────────────────

  test:
    desc: Run all tests
    cmds:
      - go test ./...

  test-verbose:
    desc: Run tests with verbose output and race detection
    cmds:
      - go test -v -race ./...

  lint:
    desc: Run golangci-lint
    cmds:
      - golangci-lint run

  fmt:
    desc: Format code with go fmt and goimports
    cmds:
      - go fmt ./...
      - goimports -w .

  check:
    desc: Run fmt + lint + test
    cmds:
      - task: fmt
      - task: lint
      - task: test

  # ── Dependencies ────────────────────────────────────────────────────────────

  deps:
    desc: Download and tidy Go dependencies
    cmds:
      - go mod download
      - go mod tidy

  vendor:
    desc: Sync vendor directory with go.mod
    cmds:
      - go mod vendor
      - go mod verify

  update-modules:
    desc: Update all Go modules to latest versions
    cmds:
      - go get -u ./...
      - go mod tidy
      - go mod vendor
      - go mod verify

  # ── Utilities ───────────────────────────────────────────────────────────────

  clean:
    desc: Remove build artifacts and fyne-cross output
    cmds:
      - cmd: rm -rf {{.BUILD_DIR}} fyne-cross
        platforms: [linux, darwin]
      - cmd: rmdir /s /q {{.BUILD_DIR}}
        platforms: [windows]

  # ── Internal helpers ────────────────────────────────────────────────────────

  copy-assets:
    internal: true
    cmds:
      - cmd: cp config.yaml {{.BUILD_DIR}}/
        platforms: [linux, darwin]
      - cmd: cp -r templates {{.BUILD_DIR}}/
        platforms: [linux, darwin]
      - cmd: xcopy /y config.yaml {{.BUILD_DIR}}
        platforms: [windows]
      - cmd: xcopy /y Generate-Signature.ps1 {{.BUILD_DIR}}
        platforms: [windows]
      - cmd: xcopy /s /e /h /i /y templates {{.BUILD_DIR}}\\templates
        platforms: [windows]

  copy-assets-posix:
    internal: true
    cmds:
      - cp config.yaml {{.BUILD_DIR}}/
      - cp -r templates {{.BUILD_DIR}}/
